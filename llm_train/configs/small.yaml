# 小模型 — 单卡 12G+, ~60M
model:
  vocab_size: 32000
  hidden_size: 512
  num_layers: 8
  num_heads: 8
  max_seq_len: 1024
  dropout: 0.0

data:
  seq_len: 1024
  batch_size: 32
  grad_accum: 4
  dataset: tinyshakespeare

tokenizer:
  vocab_size: 32000
  min_frequency: 3
  input_files:
    - data/raw/tinyshakespeare.txt

training:
  max_steps: 10000
  warmup_steps: 500
  lr: 3e-4
  min_lr_ratio: 0.1
  schedule: cosine
  weight_decay: 0.1
  amp: true
  amp_dtype: bf16
  log_every: 50
  eval_every: 500
  save_every: 1000
  out_dir: ./checkpoints/small
