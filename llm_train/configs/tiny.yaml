# 极小模型 — CPU / MPS 调试, ~15M 参数
model:
  vocab_size: 8000
  hidden_size: 256
  num_layers: 6
  num_heads: 4
  max_seq_len: 512
  dropout: 0.0
  tie_word_embeddings: true

data:
  seq_len: 512
  batch_size: 8
  grad_accum: 2
  dataset: tinyshakespeare

tokenizer:
  vocab_size: 8000
  min_frequency: 2
  input_files:
    - data/raw/tinyshakespeare.txt

training:
  max_steps: 2000
  warmup_steps: 100
  lr: 5e-4
  min_lr_ratio: 0.1
  schedule: cosine
  weight_decay: 0.1
  grad_clip: 1.0
  amp: false
  log_every: 20
  eval_every: 200
  save_every: 500
  out_dir: ./checkpoints/tiny
